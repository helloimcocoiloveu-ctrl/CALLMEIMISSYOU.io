<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DJ小可❀</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Noto Serif TC', serif;
    background: linear-gradient(135deg, #d3d3d3, #f0f0f0);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 卡片 */
.player {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 25px;

    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

#nowPlaying {
    margin-bottom: 15px;
}

/* 封面 */
.cover {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* 歌單 */
.song {
    padding: 12px;
    margin: 6px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.song:hover {
    background: rgba(255,255,255,0.5);
}

.active {
    background: rgba(255,255,255,0.7);
    font-weight: bold;
}

audio {
    width: 100%;
    margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="player">

    <h1>聽小可說</h1>
    <div id="nowPlaying">開始聆聽ü</div>

    <img id="cover" class="cover" src="cover.jpg">

    <audio id="audio" controls></audio>

    <div id="playlist"></div>

</div>

<script>

const songs = [
    {file: "HIHI.m4a", name: "第一首歌", cover: "cover.jpg"},
    {file: "HIHI.m4a", name: "第二首歌", cover: "cover2.jpg"}
];

let currentIndex = 0;

const audio = document.getElementById("audio");
const playlistDiv = document.getElementById("playlist");

/* 建立歌單 */
songs.forEach((song, index) => {
    const div = document.createElement("div");
    div.className = "song";
    div.innerText = song.name;
    div.onclick = () => playSong(index);
    playlistDiv.appendChild(div);
});

/* 播放 */
function playSong(index) {
    currentIndex = index;

    audio.src = songs[index].file;
    audio.play();

    document.getElementById("nowPlaying").innerText = "播放：" + songs[index].name;
    document.getElementById("cover").src = songs[index].cover;

    document.querySelectorAll(".song").forEach(s => s.classList.remove("active"));
    playlistDiv.children[index].classList.add("active");
}

/* 自動播放下一首 */
audio.addEventListener("ended", () => {
    currentIndex++;
    if (currentIndex >= songs.length) {
        currentIndex = 0; // 播完回第一首
    }
    playSong(currentIndex);
});

</script>

</body>
</html>
