<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<!-- 手機版關鍵 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>給你的歌</title>

<!-- 字體 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Noto Serif TC', serif;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 玻璃卡片 */
.player {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 25px;

    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

/* 標題 */
h1 {
    margin-bottom: 10px;
    font-size: 24px;
}

#nowPlaying {
    font-size: 16px;
    margin-bottom: 15px;
}

/* 封面圖 */
.cover {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 15px;
}

/* 歌單 */
.song {
    padding: 12px;
    margin: 6px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.2s;
}

.song:hover {
    background: rgba(255,255,255,0.4);
}

.active {
    background: rgba(255,255,255,0.6);
    font-weight: bold;
}

audio {
    width: 100%;
    margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="player">

    <h1>🎧 給你的歌</h1>
    <div id="nowPlaying">點一首歌開始</div>

    <!-- 封面圖（你可以換） -->
    <img id="cover" class="cover" src="cover.jpg">

    <audio id="audio" controls></audio>

    <div id="playlist">
        <div class="song" onclick="playSong('song1.mp3', '第一首歌', 'cover.jpg')">
            第一首歌
        </div>

        <div class="song" onclick="playSong('song2.mp3', '第二首歌', 'cover2.jpg')">
            第二首歌
        </div>
    </div>

</div>

<script>
function playSong(file, name, cover) {
    const audio = document.getElementById("audio");
    const coverImg = document.getElementById("cover");

    audio.src = file;
    audio.play();

    coverImg.src = cover;

    document.getElementById("nowPlaying").innerText = "正在播放：" + name;

    let songs = document.querySelectorAll(".song");
    songs.forEach(s => s.classList.remove("active"));
    event.target.classList.add("active");
}
</script>

</body>
</html>
